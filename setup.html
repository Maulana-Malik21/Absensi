<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Siswa - Setup Sistem</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="flex h-screen bg-bg-page font-sans">
        <div class="flex flex-1 flex-col overflow-hidden">
            <!-- Top Navbar -->
            <header class="h-16 bg-bg-surface border-b border-border-default flex items-center justify-between px-6 z-20 shrink-0 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center">
                        <span class="material-symbols-outlined text-[20px]">school</span>
                    </div>
                    <span class="font-bold text-lg text-text-primary tracking-tight">Titik Siswa</span>
                </div>
                <div class="text-sm font-medium text-text-muted">
                    Setup Sistem
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-text-primary mb-2">Instalasi Titik Siswa</h1>
                        <p class="text-text-muted">Konfigurasi akun admin dan profil sekolah untuk memulai menggunakan sistem.</p>
                    </div>

                    <form id="setupForm" class="space-y-6">
                        <!-- Step 1: Admin Account -->
                        <div class="bg-bg-surface border border-border-default rounded-xl shadow-sm overflow-hidden">
                            <div class="px-6 py-4 border-b border-border-default bg-bg-surface/50">
                                <h2 class="text-lg font-semibold text-text-primary flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary">person_add</span>
                                    1. Buat Akun Super Admin
                                </h2>
                            </div>
                            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="edu-label">Nama Lengkap</label>
                                    <input type="text" id="admin_full_name" required class="edu-input" placeholder="Masukkan nama lengkap">
                                </div>
                                <div>
                                    <label class="edu-label">Username</label>
                                    <input type="text" id="admin_username" required class="edu-input" placeholder="Buat username unik">
                                </div>
                                <div>
                                    <label class="edu-label">Email</label>
                                    <input type="email" id="admin_email" required class="edu-input" placeholder="admin@sekolah.sch.id">
                                </div>
                                <div>
                                    <label class="edu-label">Password</label>
                                    <input type="password" id="admin_password" required minlength="6" class="edu-input" placeholder="Minimal 6 karakter">
                                </div>
                            </div>
                        </div>

                        <!-- Step 2: School Profile & Geofence -->
                        <div class="bg-bg-surface border border-border-default rounded-xl shadow-sm overflow-hidden">
                            <div class="px-6 py-4 border-b border-border-default bg-bg-surface/50">
                                <h2 class="text-lg font-semibold text-text-primary flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary">map</span>
                                    2. Profil & Geofence Sekolah
                                </h2>
                            </div>
                            <div class="p-6">
                                <div class="mb-5">
                                    <label class="edu-label">Nama Sekolah</label>
                                    <input type="text" id="school_name" required class="edu-input" placeholder="Contoh: SMA Negeri 1 Jakarta">
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                    <div>
                                        <label class="edu-label">Latitude</label>
                                        <input type="number" step="any" id="school_latitude" value="-6.2088" required class="edu-input">
                                    </div>
                                    <div>
                                        <label class="edu-label">Longitude</label>
                                        <input type="number" step="any" id="school_longitude" value="106.8456" required class="edu-input">
                                    </div>
                                    <div>
                                        <label class="edu-label">Radius (Meter)</label>
                                        <input type="number" id="radius_meter" value="100" min="10" required class="edu-input">
                                    </div>
                                </div>

                                <div id="map" class="w-full h-64 rounded-lg border border-border-default z-10 mb-2"></div>
                                <p class="text-sm text-text-muted mb-0">*Klik pada peta untuk mengubah koordinat pusat sekolah secara interaktif.</p>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="flex justify-end">
                            <button type="submit" id="submitBtn" class="edu-btn edu-btn-primary px-8 py-3 text-base flex items-center gap-2">
                                Selesaikan Instalasi <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/utils.js?v=1781115035990"></script>
    <script src="js/api.js"></script>
    <script>
        let map, marker, circle;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const data = await api.get('/setup/status');
                if (data.data && data.data.isSetupComplete) {
                    window.location.href = 'index.html';
                    return;
                }
            } catch (err) {
                console.warn("Gagal mengecek status setup:", err);
            }

            initMap();
            
            document.getElementById('school_latitude').addEventListener('change', updateMapFromInputs);
            document.getElementById('school_longitude').addEventListener('change', updateMapFromInputs);
            document.getElementById('radius_meter').addEventListener('change', updateMapFromInputs);

            document.getElementById('setupForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 1s linear infinite;">sync</span> <span>Memproses...</span>';

                const payload = {
                    admin: {
                        full_name: document.getElementById('admin_full_name').value,
                        username: document.getElementById('admin_username').value,
                        email: document.getElementById('admin_email').value,
                        password: document.getElementById('admin_password').value
                    },
                    school: {
                        school_name: document.getElementById('school_name').value,
                        school_latitude: parseFloat(document.getElementById('school_latitude').value),
                        school_longitude: parseFloat(document.getElementById('school_longitude').value),
                        radius_meter: parseInt(document.getElementById('radius_meter').value)
                    }
                };

                try {
                    await api.post('/setup/run', payload);

                    utils.showToast('Setup Berhasil! Silakan login.', 'success');
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Berhasil!</span>';
                    btn.style.background = 'var(--success)';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } catch (error) {
                    utils.showToast(error.message || 'Setup gagal', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Selesaikan Instalasi <span class="material-symbols-outlined">arrow_forward</span>';
                }
            });
        });

        function initMap() {
            map = L.map('map').setView([-6.2088, 106.8456], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            map.on('click', function(e) {
                document.getElementById('school_latitude').value = e.latlng.lat;
                document.getElementById('school_longitude').value = e.latlng.lng;
                updateMapFromInputs();
            });
            updateMapFromInputs();
        }

        function updateMapFromInputs() {
            const lat = parseFloat(document.getElementById('school_latitude').value);
            const lng = parseFloat(document.getElementById('school_longitude').value);
            const radius = parseFloat(document.getElementById('radius_meter').value);

            if (!isNaN(lat) && !isNaN(lng)) {
                const latlng = [lat, lng];
                map.setView(latlng, 17);

                if (marker) map.removeLayer(marker);
                if (circle) map.removeLayer(circle);

                marker = L.marker(latlng).addTo(map);
                
                if (!isNaN(radius)) {
                    circle = L.circle(latlng, {
                        color: '#5E5CE6',
                        fillColor: '#5E5CE6',
                        fillOpacity: 0.2,
                        radius: radius
                    }).addTo(map);
                }
            }
        }
    </script>
</body>
</html>
