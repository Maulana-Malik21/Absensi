<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Dashboard Guru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="max-w-7xl mx-auto pb-8">

            <!-- STATUS STRIP (Compact, 1 line) -->
            <div
                class="bg-bg-surface border border-border-default rounded-lg p-3 px-5 mb-6 flex flex-wrap items-center gap-0 animate-fade-in-up">
                <div class="flex items-center gap-2 mr-6">
                    <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                    <span class="text-[13px] text-text-secondary font-medium">Sistem Online</span>
                </div>
                <div class="w-px h-4 bg-border-default mx-2 hidden sm:block"></div>
                <div class="flex items-center gap-2 mx-4">
                    <span
                        class="px-2 py-0.5 rounded border border-border-default text-[12px] font-medium text-text-primary bg-bg-hover">Tahun
                        Ajaran Aktif</span>
                </div>
                <div class="w-px h-4 bg-border-default mx-2 hidden sm:block"></div>
                <div class="flex items-center gap-2 mx-4">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-text-muted"></i>
                    <span class="text-[13px] text-text-secondary" id="current-date">--</span>
                </div>
            </div>

            <!-- WELCOME HEADER -->
            <div class="flex items-center justify-between mb-6 animate-fade-in-up">
                <div>
                    <h2 class="text-2xl font-bold text-text-primary tracking-tight mb-1">
                        Selamat Datang, <span id="teacher-name">Guru</span>!
                    </h2>
                    <p class="text-[14px] text-text-secondary">Berikut ringkasan aktivitas dan jadwal mengajar Anda hari
                        ini.</p>
                </div>
                <div class="hidden sm:flex items-center gap-3">
                    <button onclick="initPage()"
                        class="h-9 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-secondary hover:bg-bg-hover hover:border-border-strong transition-colors flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4 text-text-muted"></i> Segarkan Data
                    </button>
                </div>
            </div>

            <!-- KPI CARDS -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 animate-fade-in-up stagger-1">
                <!-- Card 1 -->
                <dl
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col hover:border-accent/30 transition-colors shadow-sm relative overflow-hidden group">
                    <div
                        class="absolute -right-4 -bottom-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="book-open" class="w-24 h-24 text-text-primary"></i>
                    </div>
                    <div class="flex items-center justify-between mb-2 relative z-10">
                        <dt class="text-[13px] font-medium text-text-muted uppercase tracking-wider">Kelas Aktif</dt>
                        <div class="w-8 h-8 rounded-md bg-accent-subtle text-accent flex items-center justify-center">
                            <i data-lucide="layers" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <div class="flex items-end justify-between mt-auto relative z-10">
                        <dd id="stat-classes" class="text-[28px] font-semibold text-text-primary tabular leading-none">
                            <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-text-muted"></i>
                        </dd>
                    </div>
                </dl>

                <!-- Card 2 -->
                <dl
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col hover:border-accent/30 transition-colors shadow-sm relative overflow-hidden group">
                    <div
                        class="absolute -right-4 -bottom-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="users" class="w-24 h-24 text-text-primary"></i>
                    </div>
                    <div class="flex items-center justify-between mb-2 relative z-10">
                        <dt class="text-[13px] font-medium text-text-muted uppercase tracking-wider">Total Siswa</dt>
                        <div class="w-8 h-8 rounded-md bg-info/10 text-info flex items-center justify-center">
                            <i data-lucide="users" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <div class="flex items-end justify-between mt-auto relative z-10">
                        <dd id="stat-students" class="text-[28px] font-semibold text-text-primary tabular leading-none">
                            <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-text-muted"></i>
                        </dd>
                    </div>
                </dl>

                <!-- Card 3 -->
                <dl
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col hover:border-accent/30 transition-colors shadow-sm relative overflow-hidden group">
                    <div
                        class="absolute -right-4 -bottom-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="user-check" class="w-24 h-24 text-success"></i>
                    </div>
                    <div class="flex items-center justify-between mb-2 relative z-10">
                        <dt class="text-[13px] font-medium text-text-muted uppercase tracking-wider">Hadir Hari Ini</dt>
                        <div class="w-8 h-8 rounded-md bg-success/10 text-success flex items-center justify-center">
                            <i data-lucide="check-circle" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <div class="flex items-end justify-between mt-auto relative z-10">
                        <dd id="stat-present" class="text-[28px] font-semibold text-success tabular leading-none">
                            <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-text-muted"></i>
                        </dd>
                    </div>
                </dl>

                <!-- Card 4 -->
                <dl
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col hover:border-accent/30 transition-colors shadow-sm relative overflow-hidden group">
                    <div
                        class="absolute -right-4 -bottom-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="activity" class="w-24 h-24 text-warning"></i>
                    </div>
                    <div class="flex items-center justify-between mb-2 relative z-10">
                        <dt class="text-[13px] font-medium text-text-muted uppercase tracking-wider">Rata-rata Kehadiran
                        </dt>
                        <div class="w-8 h-8 rounded-md bg-warning/10 text-warning flex items-center justify-center">
                            <i data-lucide="pie-chart" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <div class="flex items-end justify-between mt-auto relative z-10">
                        <dd id="stat-percentage"
                            class="text-[28px] font-semibold text-text-primary tabular leading-none">
                            <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-text-muted"></i>
                        </dd>
                    </div>
                </dl>
            </div>

            <!-- MAIN GRID -->
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-fade-in-up stagger-2">

                <!-- LEFT COLUMN: Activities & Quick Actions (takes 2 cols on xl) -->
                <div class="xl:col-span-2 space-y-6">

                    <!-- QUICK ACTIONS -->
                    <div class="bg-bg-surface border border-border-default rounded-lg p-5 shadow-sm">
                        <div class="flex items-center justify-between mb-4 border-b border-border-default pb-3">
                            <h3 class="text-[14px] font-semibold text-text-primary uppercase tracking-wide">Akses Cepat
                            </h3>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <button onclick="window.location.href='reports.html'"
                                class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg border border-border-default bg-bg-surface hover:bg-bg-hover hover:border-accent/50 hover:text-accent transition-all group">
                                <div
                                    class="w-10 h-10 rounded-full bg-accent-subtle text-accent flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="file-bar-chart" class="w-5 h-5"></i>
                                </div>
                                <span
                                    class="text-[12px] font-medium text-text-secondary group-hover:text-accent">Laporan
                                    Kelas</span>
                            </button>
                            <button onclick="window.location.href='manual-attendance.html'"
                                class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg border border-border-default bg-bg-surface hover:bg-bg-hover hover:border-accent/50 hover:text-accent transition-all group">
                                <div
                                    class="w-10 h-10 rounded-full bg-info/10 text-info flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="list-checks" class="w-5 h-5"></i>
                                </div>
                                <span class="text-[12px] font-medium text-text-secondary group-hover:text-accent">Input
                                    Manual</span>
                            </button>
                            <button onclick="window.location.href='schedule.html'"
                                class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg border border-border-default bg-bg-surface hover:bg-bg-hover hover:border-accent/50 hover:text-accent transition-all group">
                                <div
                                    class="w-10 h-10 rounded-full bg-warning/10 text-warning flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="calendar" class="w-5 h-5"></i>
                                </div>
                                <span class="text-[12px] font-medium text-text-secondary group-hover:text-accent">Jadwal
                                    Mengajar</span>
                            </button>
                            <button onclick="window.location.href='analytics.html'"
                                class="flex flex-col items-center justify-center gap-2 p-4 rounded-lg border border-border-default bg-bg-surface hover:bg-bg-hover hover:border-accent/50 hover:text-accent transition-all group">
                                <div
                                    class="w-10 h-10 rounded-full bg-success/10 text-success flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                                </div>
                                <span class="text-[12px] font-medium text-text-secondary group-hover:text-accent">Lihat
                                    Analitik</span>
                            </button>
                        </div>
                    </div>

                    <!-- JADWAL HARI INI -->
                    <div
                        class="bg-bg-surface border border-border-default rounded-lg p-5 shadow-sm min-h-[300px] flex flex-col">
                        <div class="flex items-center justify-between mb-4 border-b border-border-default pb-3">
                            <h3 class="text-[14px] font-semibold text-text-primary uppercase tracking-wide">Jadwal
                                Mengajar Hari Ini</h3>
                            <button onclick="window.location.href='schedule.html'"
                                class="text-[12px] font-medium text-accent hover:text-accent-hover flex items-center gap-1">
                                Semua Jadwal <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <div id="today-schedule-container" class="flex-1 flex flex-col justify-center">
                            <!-- Skeleton Loading -->
                            <div class="space-y-3">
                                <div class="h-16 bg-bg-hover rounded-lg animate-pulse"></div>
                                <div class="h-16 bg-bg-hover rounded-lg animate-pulse"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Analytics -->
                <div
                    class="bg-bg-surface border border-border-default rounded-lg p-5 shadow-sm min-h-[500px] flex flex-col">
                    <div class="flex items-center justify-between mb-4 border-b border-border-default pb-3">
                        <h3 class="text-[14px] font-semibold text-text-primary uppercase tracking-wide">Statistik
                            Kehadiran Hari Ini</h3>
                    </div>

                    <div class="flex-1 flex flex-col justify-center min-h-[250px] mb-6 relative">
                        <canvas id="attendanceChart" style="max-height: 250px;"></canvas>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-auto" id="attendance-distribution">
                        <!-- Populated by JS -->
                        <div
                            class="p-3 bg-bg-hover rounded border border-border-default text-center animate-pulse h-16">
                        </div>
                        <div
                            class="p-3 bg-bg-hover rounded border border-border-default text-center animate-pulse h-16">
                        </div>
                        <div
                            class="p-3 bg-bg-hover rounded border border-border-default text-center animate-pulse h-16">
                        </div>
                        <div
                            class="p-3 bg-bg-hover rounded border border-border-default text-center animate-pulse h-16">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/utils.js?v=1781115035990"></script>
    <script src="../js/api.js?v=1781115035990"></script>
    <script src="../components/layout.js?v=1781115035990"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = utils.checkAuth('teacher');
            if (!user) return;
            layout.init('teacher', 'dashboard');
            initPage();
            if (window.lucide) lucide.createIcons();
        });

        async function initPage() {
            try {
                // Pre-fill user data
                const user = JSON.parse(localStorage.getItem('user'));
                document.getElementById('teacher-name').textContent = user.full_name || 'Guru';

                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);

                // Fetch data in parallel
                const [analyticsRes, statsRes, scheduleRes] = await Promise.all([
                    api.get('/analytics/teacher').catch(() => ({ data: { percentage: '0%', stats: { present: 0, sick: 0, permission: 0, absent: 0 } } })),
                    api.get('/attendance/teacher/stats').catch(() => ({ data: { active_classes: 0, total_students: 0, present_today: 0 } })),
                    api.get('/teachers/me/schedule').catch(() => ({ data: [] }))
                ]);

                const analytics = analyticsRes.data;
                const stats = statsRes.data;
                const schedules = scheduleRes.data || [];

                // 1. Populate KPI Cards
                document.getElementById('stat-classes').textContent = stats.active_classes || 0;
                document.getElementById('stat-students').textContent = stats.total_students || 0;
                document.getElementById('stat-present').textContent = stats.present_today || 0;
                document.getElementById('stat-percentage').textContent = analytics.percentage || '0%';

                // 2. Build Today's Schedule
                buildTodaySchedule(schedules);

                // 3. Build Chart and Distribution
                buildAttendanceChart(analytics.stats);

            } catch (error) {
                console.error(error);
                if (window.utils && utils.showToast) utils.showToast('Gagal memuat data dashboard', 'error');
            } finally {
                if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
            }
        }

        function buildTodaySchedule(schedules) {
            const container = document.getElementById('today-schedule-container');
            const todayName = new Date().toLocaleDateString('id-ID', { weekday: 'long' });

            // Filter schedules for today
            const todaySchedules = schedules.filter(s => s.day_of_week.toLowerCase() === todayName.toLowerCase());

            if (todaySchedules.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-8 text-center">
                        <div class="w-16 h-16 rounded-full bg-bg-hover flex items-center justify-center mb-4">
                            <i data-lucide="calendar-x-2" class="w-8 h-8 text-text-muted"></i>
                        </div>
                        <h4 class="text-[14px] font-semibold text-text-primary mb-1">Tidak ada jadwal hari ini</h4>
                        <p class="text-[13px] text-text-secondary">Anda bisa bersantai atau meninjau laporan kelas Anda.</p>
                    </div>
                `;
            } else {
                let html = '<div class="space-y-3 justify-start flex-1">';
                todaySchedules.forEach(s => {
                    // Check if class is ongoing
                    const now = new Date();
                    const currentTimeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                    const isOngoing = currentTimeStr >= s.start_time.substring(0, 5) && currentTimeStr <= s.end_time.substring(0, 5);
                    const isPast = currentTimeStr > s.end_time.substring(0, 5);

                    let statusBadge = '';
                    let actionBtn = '';

                    if (isOngoing) {
                        statusBadge = '<span class="px-2 py-0.5 rounded text-[11px] font-medium bg-success/10 text-success">Sedang Berlangsung</span>';
                        actionBtn = `<button onclick="startClass(this, ${s.class_id}, ${s.subject_id})" class="h-8 px-3 bg-accent text-white hover:bg-accent-hover rounded flex items-center justify-center text-[12px] font-medium transition-colors">Mulai Sesi</button>`;
                    } else if (isPast) {
                        statusBadge = '<span class="px-2 py-0.5 rounded text-[11px] font-medium bg-bg-hover text-text-secondary">Selesai</span>';
                        actionBtn = `<button disabled class="h-8 px-3 bg-bg-surface border border-border-default text-text-placeholder rounded flex items-center justify-center text-[12px] font-medium cursor-not-allowed">Selesai</button>`;
                    } else {
                        statusBadge = '<span class="px-2 py-0.5 rounded text-[11px] font-medium bg-info/10 text-info">Akan Datang</span>';
                        actionBtn = `<button onclick="startClass(this, ${s.class_id}, ${s.subject_id})" class="h-8 px-3 bg-bg-surface border border-border-default hover:border-accent hover:text-accent text-text-primary rounded flex items-center justify-center text-[12px] font-medium transition-colors">Persiapkan</button>`;
                    }

                    html += `
                        <div class="flex items-center justify-between p-4 rounded-lg border ${isOngoing ? 'border-accent shadow-sm' : 'border-border-default'} bg-bg-surface hover:bg-bg-hover transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-md bg-accent-subtle text-accent flex flex-col items-center justify-center shrink-0">
                                    <span class="text-[12px] font-bold leading-none mb-1">${s.start_time.substring(0, 5)}</span>
                                </div>
                                <div>
                                    <h4 class="text-[14px] font-bold text-text-primary mb-0.5 flex items-center gap-2">
                                        ${s.class_name} 
                                        ${statusBadge}
                                    </h4>
                                    <p class="text-[12px] text-text-secondary flex items-center gap-1">
                                        <i data-lucide="book" class="w-3.5 h-3.5 text-text-muted"></i> ${s.subject_name} 
                                        <span class="mx-1">&bull;</span> 
                                        <i data-lucide="clock" class="w-3.5 h-3.5 text-text-muted"></i> ${s.start_time.substring(0, 5)} - ${s.end_time.substring(0, 5)}
                                    </p>
                                </div>
                            </div>
                            <div class="shrink-0">
                                ${actionBtn}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            }

            if (window.lucide) lucide.createIcons({ root: container });
        }

        function buildAttendanceChart(st) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            const total = (st.present || 0) + (st.absent || 0) + (st.sick || 0) + (st.permission || 0);

            // Populate distribution breakdown
            document.getElementById('attendance-distribution').innerHTML = `
                <div class="p-3 bg-bg-surface rounded-lg border border-border-default flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-success"></span><span class="text-[12px] font-medium text-text-secondary">Hadir</span></div>
                    <span class="text-[14px] font-bold text-text-primary tabular">${st.present || 0}</span>
                </div>
                <div class="p-3 bg-bg-surface rounded-lg border border-border-default flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-info"></span><span class="text-[12px] font-medium text-text-secondary">Izin</span></div>
                    <span class="text-[14px] font-bold text-text-primary tabular">${st.permission || 0}</span>
                </div>
                <div class="p-3 bg-bg-surface rounded-lg border border-border-default flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-warning"></span><span class="text-[12px] font-medium text-text-secondary">Sakit</span></div>
                    <span class="text-[14px] font-bold text-text-primary tabular">${st.sick || 0}</span>
                </div>
                <div class="p-3 bg-bg-surface rounded-lg border border-border-default flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-danger"></span><span class="text-[12px] font-medium text-text-secondary">Alpha</span></div>
                    <span class="text-[14px] font-bold text-text-primary tabular">${st.absent || 0}</span>
                </div>
            `;

            if (window.attendanceChartInstance) {
                window.attendanceChartInstance.destroy();
            }

            if (total === 0) {
                window.attendanceChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Belum ada data'],
                        datasets: [{ data: [1], backgroundColor: ['#E5E7EB'], borderWidth: 0 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { tooltip: { enabled: false } } }
                });
            } else {
                window.attendanceChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Hadir', 'Izin', 'Sakit', 'Alpha'],
                        datasets: [{
                            data: [st.present || 0, st.permission || 0, st.sick || 0, st.absent || 0],
                            backgroundColor: ['#10B981', '#3B82F6', '#F59E0B', '#EF4444'],
                            borderWidth: 0,
                            hoverOffset: 6
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '75%',
                        plugins: {
                            legend: { display: false }, // Use custom HTML legend below
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleFont: { size: 13, family: "'Inter', sans-serif" },
                                bodyFont: { size: 13, family: "'Inter', sans-serif" },
                                padding: 10,
                                cornerRadius: 4,
                                displayColors: true
                            }
                        }
                    }
                });
            }
        }

        async function startClass(btn, classId, subjectId) {
            if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Memulai...');
            try {
                const response = await api.post('/qr/generate', { class_id: classId, subject_id: subjectId });
                sessionStorage.setItem('active_session_id', response.data.id);
                window.location.replace('active-session.html');
            } catch (error) {
                if (window.utils && utils.showToast) utils.showToast(error.message || 'Gagal memulai sesi absensi', 'error');
                if (window.ui && ui.resetButton) ui.resetButton(btn);
            }
        }
    </script>
</body>

</html>
