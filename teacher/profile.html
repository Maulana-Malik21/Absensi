<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Profil Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="w-full max-w-5xl mx-auto">
            <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-fade-in-up">
                <div>
                    <h2 class="text-2xl font-bold text-text-primary tracking-tight mb-1">Profil Saya</h2>
                    <p class="text-[14px] text-text-secondary">Informasi pribadi dan data akademik Anda.</p>
                </div>
                <button onclick="ui.showModal('editProfileModal')" class="w-full sm:w-auto h-9 px-4 bg-accent text-white hover:bg-accent-hover rounded-md text-[13px] font-medium flex items-center justify-center gap-2 transition-colors shadow-sm whitespace-nowrap">
                    <i data-lucide="edit-3" class="w-4 h-4"></i> Edit Data Diri
                </button>
            </div>

            <div class="bg-bg-surface border border-border-default rounded-lg overflow-hidden animate-fade-in-up stagger-1 relative">
                <!-- Background Header -->
                <div class="h-32 bg-gradient-to-r from-accent/20 to-accent/5"></div>
                
                <div class="px-6 pb-8 -mt-16 relative" id="profile-content">
                    <div class="flex items-center justify-center p-12">
                        <i data-lucide="loader-2" class="w-6 h-6 text-accent animate-spin mr-3"></i>
                        <span class="text-[14px] text-text-secondary font-medium">Memuat profil...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- EDIT PROFILE MODAL -->
    <div id="editProfileModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50 animate-fade-in">
        <div class="bg-bg-surface w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-scale-in">
            <div class="px-6 py-4 border-b border-border-default flex items-center justify-between">
                <h3 class="text-[16px] font-semibold text-text-primary">Edit Data Diri</h3>
                <button onclick="ui.hideModal('editProfileModal')" class="text-text-muted hover:text-text-primary transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="editProfileForm">
                <div class="p-6 flex flex-col gap-5">
                    <div class="w-full">
                        <label class="block text-[13px] font-semibold text-text-secondary mb-1.5">Email</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                            <input type="email" name="email" id="edit_email" class="w-full pl-9 pr-3 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle transition-colors" placeholder="Masukkan email aktif">
                        </div>
                    </div>
                    <div class="w-full">
                        <label class="block text-[13px] font-semibold text-text-secondary mb-1.5">Nomor Telepon / WhatsApp</label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                            <input type="text" name="phone" id="edit_phone" class="w-full pl-9 pr-3 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle transition-colors" placeholder="08...">
                        </div>
                    </div>
                    <div class="w-full">
                        <label class="block text-[13px] font-semibold text-text-secondary mb-1.5">Alamat Domisili</label>
                        <textarea name="address" id="edit_address" class="w-full px-3 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle transition-colors" rows="3" placeholder="Masukkan alamat lengkap"></textarea>
                    </div>
                    <div class="w-full" id="parent-contact-container">
                        <label class="block text-[13px] font-semibold text-text-secondary mb-1.5">Kontak Orang Tua / Wali (Opsional)</label>
                        <div class="relative">
                            <i data-lucide="user-plus" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                            <input type="text" name="parent_contact" id="edit_parent_contact" class="w-full pl-9 pr-3 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle transition-colors" placeholder="08...">
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-border-default bg-gray-50/50 flex items-center justify-end gap-3">
                    <button type="button" onclick="ui.hideModal('editProfileModal')" class="h-9 px-4 bg-bg-surface border border-border-default hover:bg-bg-hover text-text-primary rounded-md text-[13px] font-medium transition-colors">Batal</button>
                    <button type="submit" class="h-9 px-4 bg-accent text-white hover:bg-accent-hover rounded-md text-[13px] font-medium flex items-center justify-center transition-colors shadow-sm">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/utils.js?v=1781115035990"></script>
    <script src="../js/api.js?v=1781115035990"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/layout.js?v=1781115035990"></script>
    <script>
        let currentStudent = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = utils.checkAuth('teacher');
            if (!user) return;
            layout.init('teacher', ''); 
            if(window.lucide) lucide.createIcons();
            await initPage(user);
            if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();

            document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = Object.fromEntries(new FormData(e.target).entries());
                const btn = e.target.querySelector('button[type="submit"]');
                if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Menyimpan...');

                try {
                    await api.put('/teachers/me/profile', data);
                    if(window.utils && utils.showToast) utils.showToast('Profil berhasil diperbarui', 'success');
                    ui.hideModal('editProfileModal');
                    initPage(user); // Reload data
                } catch (err) {
                    if(window.utils && utils.showToast) utils.showToast(err.message, 'error');
                } finally {
                    if (window.ui && ui.resetButton) ui.resetButton(btn);
                }
            });
        });

        async function initPage(user) {
            const content = document.getElementById('profile-content');
            try {
                const res = await api.get(`/teachers/me/profile`);
                const teacher = res.data;
                currentStudent = teacher; // keep variable name for simplicity

                // Pre-fill form
                document.getElementById('edit_email').value = teacher.email || '';
                document.getElementById('edit_phone').value = teacher.phone || '';
                document.getElementById('edit_address').value = teacher.address || '';
                const pContactInput = document.getElementById('edit_parent_contact');
                if(pContactInput) {
                    document.getElementById('parent-contact-container').style.display = 'none';
                }

                // Teacher assignments
                let assignmentHtml = '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[12px] font-medium bg-warning-subtle text-warning">Belum ada penugasan</span>';
                try {
                    const assignRes = await api.get('/teachers/me/assignments');
                    if (assignRes.data && assignRes.data.subjects && assignRes.data.subjects.length > 0) {
                        const subjects = assignRes.data.subjects.map(s => s.name).join(', ');
                        const classes = assignRes.data.classes.map(c => c.name).join(', ');
                        assignmentHtml = `
                            <div class="grid grid-cols-[110px_1fr] gap-3 items-center">
                                <span class="text-[13px] text-text-secondary">Mata Pelajaran</span>
                                <span class="text-[13px] font-semibold text-text-primary">${subjects}</span>
                                
                                <span class="text-[13px] text-text-secondary">Mengajar Kelas</span>
                                <span class="text-[13px] font-semibold text-text-primary">${classes}</span>
                            </div>
                        `;
                    }
                } catch(e) {
                    console.log('Error loading assignments', e);
                }

                let avatarHtml = `
                <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-accent text-white flex items-center justify-center text-4xl font-bold shrink-0 shadow-lg ring-4 ring-bg-surface">
                    ${teacher.full_name.charAt(0).toUpperCase()}
                </div>`;

                if (teacher.profile_picture) {
                    avatarHtml = `<img src="${teacher.profile_picture}" alt="Profile" class="w-24 h-24 sm:w-28 sm:h-28 rounded-full object-cover shrink-0 shadow-lg ring-4 ring-bg-surface">`;
                }

                content.innerHTML = `
                    <div class="flex flex-col sm:flex-row gap-6 sm:gap-8 items-center sm:items-start text-center sm:text-left">
                        ${avatarHtml}
                        <div class="flex-1 min-w-0 w-full mt-2 sm:mt-16">
                            <h3 class="text-2xl font-bold text-text-primary mb-1">${teacher.full_name}</h3>
                            <p class="text-[14px] text-text-secondary mb-6 flex items-center justify-center sm:justify-start gap-2">
                                <i data-lucide="badge-check" class="w-4 h-4 text-accent"></i>
                                NIP: <span class="font-medium text-text-primary">${teacher.nip}</span>
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-2 text-left">
                                <div class="bg-bg-surface border border-border-default rounded-lg p-5 hover:border-accent/30 transition-colors shadow-sm">
                                    <h4 class="text-[12px] font-semibold text-text-secondary uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="contact" class="w-4 h-4"></i> Data Kontak
                                    </h4>
                                    <div class="flex flex-col gap-3 text-[13px]">
                                        <div class="flex gap-3 text-text-primary items-start">
                                            <i data-lucide="mail" class="w-4 h-4 text-text-muted shrink-0 mt-0.5"></i> 
                                            <span class="break-all">${teacher.email || '<i class="text-text-muted font-normal">Belum diisi</i>'}</span>
                                        </div>
                                        <div class="flex gap-3 text-text-primary items-center">
                                            <i data-lucide="phone" class="w-4 h-4 text-text-muted shrink-0"></i> 
                                            <span>${teacher.phone || '<i class="text-text-muted font-normal">Belum diisi</i>'}</span>
                                        </div>
                                        <div class="flex gap-3 text-text-primary items-start">
                                            <i data-lucide="map-pin" class="w-4 h-4 text-text-muted shrink-0 mt-0.5"></i> 
                                            <span>${teacher.address || '<i class="text-text-muted font-normal">Belum diisi</i>'}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="bg-bg-surface border border-border-default rounded-lg p-5 hover:border-accent/30 transition-colors shadow-sm">
                                    <h4 class="text-[12px] font-semibold text-text-secondary uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i data-lucide="briefcase" class="w-4 h-4"></i> Informasi Penugasan
                                    </h4>
                                    ${assignmentHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                if(window.lucide) lucide.createIcons({root: content});
            } catch (err) {
                console.error(err);
                content.innerHTML = `
                    <div class="py-12 text-center text-danger mt-12">
                        <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p class="text-[14px] font-medium">Gagal memuat profil.</p>
                        <p class="text-[12px] mt-1">${err.message}</p>
                    </div>
                `;
                if(window.lucide) lucide.createIcons({root: content});
            }
        }
    </script>
</body>
</html>
