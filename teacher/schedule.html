<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Teacher Schedule</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="w-full max-w-7xl mx-auto">
            <div class="mb-6 animate-fade-in-up">
                <h2 class="text-2xl font-bold text-text-primary tracking-tight mb-1">Jadwal Mengajar Saya</h2>
                <p class="text-[14px] text-text-secondary">Lihat jadwal mengajar di kelas beserta mata pelajaran yang diampu.</p>
            </div>

            <div class="animate-fade-in-up stagger-1">
                <div id="schedule-container" class="flex flex-col gap-6">
                    <div class="flex items-center justify-center p-8 bg-bg-surface border border-border-default rounded-lg">
                        <i data-lucide="loader-2" class="w-5 h-5 text-accent animate-spin mr-2"></i>
                        <span class="text-[13px] text-text-secondary font-medium">Memuat jadwal...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/utils.js?v=1781115035990"></script>
    <script src="../js/api.js?v=1781115035990"></script>
    <script src="../components/layout.js?v=1781115035990"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = utils.checkAuth('teacher');
            if (!user) return;
            layout.init('teacher', 'schedule');
            await initPage(user);
            if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
        });

        async function initPage(user) {
            try {
                const schedRes = await api.get('/teachers/me/schedule');
                const schedules = schedRes.data || [];
                const container = document.getElementById('schedule-container');
                
                if (schedules.length === 0) {
                    container.innerHTML = `
                        <div class="bg-bg-surface border border-border-default rounded-lg p-12 flex flex-col items-center justify-center text-center">
                            <div class="w-16 h-16 bg-bg-hover rounded-full flex items-center justify-center mb-4 text-text-placeholder">
                                <i data-lucide="calendar-x" class="w-8 h-8"></i>
                            </div>
                            <h3 class="text-[15px] font-semibold text-text-primary mb-2">Tidak Ada Jadwal</h3>
                            <p class="text-[13px] text-text-muted max-w-sm">Anda belum memiliki jadwal kelas yang ditetapkan untuk tahun ajaran ini.</p>
                        </div>
                    `;
                    if (window.lucide) lucide.createIcons();
                    return;
                }

                const daysOrder = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
                const daysIndo = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const currentDayName = daysIndo[new Date().getDay()];

                // Group by day
                const grouped = {};
                daysOrder.forEach(d => grouped[d] = []);

                schedules.forEach(s => {
                    if (grouped[s.day_of_week]) {
                        grouped[s.day_of_week].push(s);
                    }
                });

                let html = '';

                daysOrder.forEach(day => {
                    let daySchedules = grouped[day];
                    if (daySchedules.length === 0) return;

                    daySchedules.sort((a,b) => a.start_time.localeCompare(b.start_time));

                    // Merge consecutive blocks for the same class and subject
                    const mergedSchedules = [];
                    let currentSched = null;

                    daySchedules.forEach(sched => {
                        if (!currentSched) {
                            currentSched = { ...sched };
                        } else {
                            if (currentSched.subject_id === sched.subject_id && 
                                currentSched.class_id === sched.class_id && 
                                currentSched.end_time >= sched.start_time) {
                                if (sched.end_time > currentSched.end_time) {
                                    currentSched.end_time = sched.end_time;
                                }
                            } else {
                                mergedSchedules.push(currentSched);
                                currentSched = { ...sched };
                            }
                        }
                    });
                    if (currentSched) mergedSchedules.push(currentSched);
                    
                    daySchedules = mergedSchedules;

                    const isToday = day === currentDayName;
                    const borderClass = isToday ? 'border-accent' : 'border-border-default';
                    const textClass = isToday ? 'text-accent' : 'text-text-primary';
                    const badgeHtml = isToday ? '<span class="ml-2 px-2 py-0.5 rounded border border-accent/20 bg-accent-subtle text-accent text-[11px] font-medium leading-none">Hari Ini</span>' : '';
                    const iconHtml = isToday ? '<i data-lucide="calendar" class="w-4 h-4 mr-1.5 inline-block -mt-0.5"></i>' : '';

                    html += `
                        <div class="mb-4">
                            <h3 class="text-[14px] font-bold ${textClass} border-b-2 ${borderClass} pb-2 mb-4 flex items-center uppercase tracking-wide">
                                ${iconHtml}${day} ${badgeHtml}
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${daySchedules.map(c => {
                                    const startTime = c.start_time.substring(0, 5);
                                    const endTime = c.end_time.substring(0, 5);
                                    
                                    return `
                                        <div class="bg-bg-surface border border-border-default rounded-lg flex flex-col hover-lift ${isToday ? 'border-l-4 border-l-accent' : ''}">
                                            <div class="p-5 flex-1">
                                                <div class="flex justify-between items-start mb-3">
                                                    <div>
                                                        <h4 class="text-[14px] font-bold text-text-primary mb-1">${c.subject_name}</h4>
                                                        <p class="text-[12px] text-text-muted">Kelas: ${c.class_name} (Grade ${c.grade_level})</p>
                                                    </div>
                                                    <div class="bg-bg-hover rounded-md px-3 py-2 text-center border border-border-default">
                                                        <p class="text-[13px] font-bold text-text-primary tabular leading-none mb-1">${startTime}</p>
                                                        <p class="text-[10px] text-text-muted tabular leading-none">s/d ${endTime}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="border-t border-border-default p-4 bg-bg-surface/50 rounded-b-lg">
                                                <button onclick="startClass(this, ${c.class_id}, ${c.subject_id}, '${day}', '${startTime}')" class="w-full h-9 bg-accent-subtle text-accent hover:bg-accent hover:text-white border border-transparent rounded-md text-[13px] font-medium flex items-center justify-center gap-2 transition-colors">
                                                    <i data-lucide="qr-code" class="w-4 h-4"></i> Mulai Kelas
                                                </button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                if (window.lucide) lucide.createIcons();

            } catch (error) {
                console.error(error);
                if (window.utils && utils.showToast) utils.showToast('Gagal memuat jadwal', 'error');
            }
        }

        async function startClass(btn, classId, subjectId, day, startTime) {
            // Validate time
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const currentDay = days[now.getDay()];
            
            if (currentDay !== day) {
                if (window.utils && utils.showToast) utils.showToast(`Jadwal ini hanya untuk hari ${day}.`, 'error');
                return;
            }

            const [startHour, startMin] = startTime.split(':').map(Number);
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();

            // Allow starting 15 minutes early
            const startTotalMins = startHour * 60 + startMin;
            const currentTotalMins = currentHour * 60 + currentMin;

            if (currentTotalMins < startTotalMins - 15) {
                if (window.utils && utils.showToast) utils.showToast(`Sesi hanya bisa dimulai paling cepat 15 menit sebelum waktu jadwal (${startTime}).`, 'error');
                return;
            }

            if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Memulai...');

            try {
                const response = await api.post('/qr/generate', { class_id: classId, subject_id: subjectId });
                sessionStorage.setItem('active_session_id', response.data.id);
                window.location.replace('active-session.html');
            } catch (error) { 
                let msg = error.message || 'Gagal memulai sesi absensi';
                if (typeof msg === 'string' && msg.includes('Access denied')) {
                    msg = 'Anda belum ditugaskan untuk mengajar mata pelajaran ini pada kelas yang dipilih. Silakan hubungi Administrator Sekolah.';
                }
                if(window.utils && utils.showToast) utils.showToast(msg, 'error'); 
                if (window.ui && ui.resetButton) ui.resetButton(btn);
            }
        }
    </script>
</body>
</html>
