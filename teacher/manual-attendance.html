<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Siswa - Absensi Manual</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="w-full max-w-7xl mx-auto">
            <!-- Header Card -->
            <div class="bg-bg-surface border border-border-default rounded-lg p-6 mb-6 animate-fade-in-up">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-xl font-bold text-text-primary mb-2">Absensi Manual</h2>
                        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                            <div class="relative">
                                <i data-lucide="users" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                                <select id="class-select" class="w-full sm:w-48 pl-9 pr-8 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle appearance-none">
                                    <option value="">Pilih Kelas...</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-muted pointer-events-none"></i>
                            </div>
                            <span class="hidden sm:inline text-text-placeholder">•</span>
                            <div class="relative">
                                <i data-lucide="book-open" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                                <select id="subject-select" class="w-full sm:w-56 pl-9 pr-8 py-2 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle appearance-none">
                                    <option value="">Pilih Mata Pelajaran...</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-muted pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                    <button onclick="fetchStudents(this)" class="w-full md:w-auto h-9 px-4 bg-accent text-white hover:bg-accent-hover rounded-md text-[13px] font-medium flex items-center justify-center gap-2 transition-colors shrink-0 mt-4 md:mt-0">
                        <i data-lucide="search" class="w-4 h-4"></i> Tampilkan Murid
                    </button>
                </div>
            </div>

            <!-- Student List -->
            <div class="bg-bg-surface border border-border-default rounded-lg flex flex-col animate-fade-in-up stagger-1">
                <div class="px-5 py-4 border-b border-border-default">
                    <h3 class="text-[14px] font-semibold text-text-primary">Daftar Murid</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-bg-hover border-b border-border-default">
                                <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap w-16">No.</th>
                                <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap">Siswa</th>
                                <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap w-32">NIS</th>
                                <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap text-right">Status Absensi</th>
                            </tr>
                        </thead>
                        <tbody id="students-tbody">
                            <tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-text-muted">Silakan pilih kelas dan klik Tampilkan Murid</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-end mt-6">
                <button onclick="submitAttendance()" id="submit-btn" style="display:none;" class="h-10 px-5 bg-accent text-white hover:bg-accent-hover rounded-md text-[13px] font-medium items-center justify-center gap-2 transition-colors shadow-sm">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan Absensi
                </button>
            </div>
        </div>
    </main>

    <script src="../js/utils.js?v=2"></script>
    <script src="../js/api.js?v=2"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/layout.js?v=4"></script>
    <script>
        let currentStudents = [];
        let attendanceMap = {};
        let classStatsMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const user = utils.checkAuth('teacher');
            if (!user) return;
            layout.init('teacher', 'manual');
            await initPage();
            if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
            if(window.lucide) lucide.createIcons();
        });

        async function initPage() {
            try {
                const assignmentsRes = await api.get('/teachers/me/assignments');
                const { classes, subjects } = assignmentsRes.data;
                const classSelect = document.getElementById('class-select');
                if (classes && classes.length > 0) {
                    classSelect.innerHTML = '<option value="">Pilih Kelas...</option>' + classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                } else { classSelect.innerHTML = '<option value="">Tidak ada kelas ditugaskan</option>'; classSelect.disabled = true; }
                const subjectSelect = document.getElementById('subject-select');
                if (subjects && subjects.length > 0) {
                    subjectSelect.innerHTML = '<option value="">Pilih Mata Pelajaran...</option>' + subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                } else { subjectSelect.innerHTML = '<option value="">Tidak ada mapel ditugaskan</option>'; subjectSelect.disabled = true; }
            } catch (error) { console.error(error); if(window.utils && utils.showToast) utils.showToast('Gagal memuat form atau akses ditolak', 'error'); }
        }

        async function fetchStudents(btn) {
            const classId = document.getElementById('class-select').value;
            const subjectId = document.getElementById('subject-select').value;
            if (!classId || !subjectId) { if(window.utils && utils.showToast) utils.showToast('Pilih Kelas dan Mata Pelajaran terlebih dahulu', 'error'); return; }
            const tbody = document.getElementById('students-tbody');
            if (window.ui && ui.getTableSkeleton) {
                tbody.innerHTML = window.ui.getTableSkeleton(4, 5);
                const firstTr = tbody.querySelector('tr');
                if (firstTr) {
                    const skeletonHtml = firstTr.outerHTML;
                    tbody.innerHTML = skeletonHtml.repeat(5);
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-text-muted"><div class="flex items-center justify-center gap-2"><i data-lucide="loader-2" class="w-4 h-4 text-accent animate-spin"></i> Memuat...</div></td></tr>';
            }
            if(btn && window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Memuat...');
            try {
                const [studentsRes, statsRes] = await Promise.all([
                    api.get(`/students?class_id=${classId}&limit=100&is_active=true`),
                    api.get(`/attendance/class/${classId}/stats`)
                ]);
                currentStudents = studentsRes.data.students || [];
                classStatsMap = statsRes.data || {};
                
                attendanceMap = {};
                currentStudents.forEach(s => attendanceMap[s.id] = 'present');
                renderStudents();
                document.getElementById('submit-btn').style.display = 'flex';
            } catch (error) { 
                console.error('Fetch Students Error:', error);
                if(window.utils && utils.showToast) utils.showToast('Data siswa tidak ditemukan atau gagal terhubung', 'error'); 
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-danger">Terjadi kesalahan saat memuat data siswa.</td></tr>'; 
            } finally {
                if (btn && window.ui && ui.resetButton) ui.resetButton(btn);
            }
        }

        function renderStudents() {
            const tbody = document.getElementById('students-tbody');
            if (currentStudents.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-text-muted">Belum ada siswa pada kelas ini</td></tr>'; return; }
            tbody.innerHTML = currentStudents.map((s, index) => {
                const status = attendanceMap[s.id];
                const stats = classStatsMap[s.id];
                let percentHtml = '<span class="text-[11px] text-text-placeholder mt-0.5">Belum ada riwayat</span>';
                if (stats && stats.total > 0) {
                    const colorClass = stats.percent >= 80 ? 'text-success' : (stats.percent >= 60 ? 'text-warning' : 'text-danger');
                    percentHtml = `<span class="text-[11px] ${colorClass} font-semibold mt-0.5">Hadir: ${stats.percent}% (${stats.total} sesi)</span>`;
                }

                const getBtnClasses = (val) => {
                    const isActive = status === val;
                    let activeClasses = "";
                    if(val === 'present') activeClasses = "border-success/30 bg-success-subtle text-success";
                    else if(val === 'absent') activeClasses = "border-danger/30 bg-danger-subtle text-danger";
                    else if(val === 'sick') activeClasses = "border-warning/30 bg-warning-subtle text-warning";
                    else if(val === 'permission') activeClasses = "border-info/30 bg-info-subtle text-info";
                    
                    if(isActive) return `px-3 py-1.5 rounded-md text-[12px] font-semibold border transition-colors ${activeClasses}`;
                    return `px-3 py-1.5 rounded-md text-[12px] font-medium border border-border-default bg-bg-surface text-text-muted hover:bg-bg-hover hover:text-text-secondary transition-colors`;
                };

                return `<tr class="border-b border-border-default hover:bg-bg-hover transition-colors">
                    <td class="px-6 py-3 text-[13px] text-text-secondary whitespace-nowrap">${index + 1}</td>
                    <td class="px-6 py-3 whitespace-nowrap">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-accent-subtle text-accent flex items-center justify-center font-bold text-[12px]">${(s.name || '?').charAt(0)}</div>
                            <div class="flex flex-col">
                                <span class="text-[13px] font-medium text-text-primary">${s.name || '-'}</span>
                                ${percentHtml}
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-3 text-[13px] text-text-secondary font-mono whitespace-nowrap">${s.nis || '-'}</td>
                    <td class="px-6 py-3 text-right whitespace-nowrap">
                        <div class="flex justify-end gap-1.5">
                            <button onclick="setStatus(${s.id}, 'present')" class="${getBtnClasses('present')}">Hadir</button>
                            <button onclick="setStatus(${s.id}, 'absent')" class="${getBtnClasses('absent')}">Alpha</button>
                            <button onclick="setStatus(${s.id}, 'sick')" class="${getBtnClasses('sick')}">Sakit</button>
                            <button onclick="setStatus(${s.id}, 'permission')" class="${getBtnClasses('permission')}">Izin</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function setStatus(studentId, status) { attendanceMap[studentId] = status; renderStudents(); }

        async function submitAttendance() {
            const classId = document.getElementById('class-select').value;
            const subjectId = document.getElementById('subject-select').value;
            const btn = document.getElementById('submit-btn');
            if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Menyimpan...');
            try {
                const promises = currentStudents.map(s => {
                    const payload = { student_id: s.id, class_id: classId, subject_id: subjectId, status: attendanceMap[s.id] };
                    console.log('Attendance Payload:', payload);
                    return api.post('/attendance/manual', payload)
                        .then(res => ({ status: 'fulfilled', student: s, res }))
                        .catch(err => ({ status: 'rejected', student: s, reason: err }));
                });
                const results = await Promise.all(promises);
                
                const fulfilled = results.filter(r => r.status === 'fulfilled');
                const rejected = results.filter(r => r.status === 'rejected');
                
                console.log('API Response (All):', results);
                
                if (rejected.length === 0) {
                    if(window.utils && utils.showToast) utils.showToast('Seluruh absensi berhasil disimpan!', 'success');
                } else {
                    console.log('Failed Students:', rejected);
                    
                    // Show a generic toast so it doesn't break UI layout, but also show alert for details
                    if(window.utils && utils.showToast) {
                        utils.showToast(`${fulfilled.length} berhasil disimpan, ${rejected.length} gagal.`, 'error');
                    }
                    
                    let errorDetails = `Berhasil: <b>${fulfilled.length}</b> siswa<br>Gagal: <b>${rejected.length}</b> siswa<br><br><div class="text-left bg-bg-page p-3 rounded border border-border-default h-32 overflow-y-auto text-[12px]">`;
                    rejected.forEach((r, index) => {
                        let msg = r.reason.message || r.reason;
                        if (typeof msg === 'string' && msg.includes('Access denied')) {
                            msg = 'Anda belum ditugaskan untuk mengajar mata pelajaran ini pada kelas yang dipilih. Silakan hubungi Administrator Sekolah.';
                        }
                        errorDetails += `<div class="mb-1"><b>${index + 1}. ${r.student.name || r.student.full_name}</b>: ${msg}</div>`;
                    });
                    errorDetails += `</div>`;
                    
                    if(window.ui && ui.alert) await ui.alert(errorDetails, 'Sebagian Data Gagal Disimpan');
                }
            } catch (error) { 
                console.error('Submit Attendance Error:', error);
                if(window.utils && utils.showToast) utils.showToast('Terjadi kesalahan sistem saat menyimpan data', 'error'); 
            }
            finally { 
                if (window.ui && ui.resetButton) ui.resetButton(btn);
            }
        }
    </script>
</body>
</html>
