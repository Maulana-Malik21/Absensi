<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Sesi Aktif</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="w-full max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-6 animate-fade-in-up">
                <!-- QR Code -->
                <div class="bg-bg-surface border border-border-default rounded-lg flex flex-col items-center p-6 text-center h-fit">
                    <h3 class="text-[15px] font-semibold text-text-primary mb-1">Scan untuk Hadir</h3>
                    <p class="text-[13px] text-text-muted mb-6" id="class-info">Memuat sesi...</p>
                    
                    <div class="w-48 h-48 bg-white border-2 border-dashed border-border-default rounded-xl flex items-center justify-center relative mb-6 p-2">
                        <div id="qrcode" class="z-10"></div>
                    </div>
                    
                    <div class="flex gap-2 w-full mb-3">
                        <button id="download-btn" class="flex-1 h-9 bg-bg-surface border border-border-default hover:bg-bg-hover rounded-md text-[13px] font-medium text-text-primary flex items-center justify-center gap-1.5 transition-colors">
                            <i data-lucide="download" class="w-4 h-4 text-text-muted"></i> Unduh
                        </button>
                        <button id="share-btn" class="flex-1 h-9 bg-accent-subtle text-accent border border-accent/20 hover:bg-accent hover:text-white rounded-md text-[13px] font-medium flex items-center justify-center gap-1.5 transition-colors">
                            <i data-lucide="share-2" class="w-4 h-4"></i> Bagikan
                        </button>
                    </div>
                    <button id="end-btn" class="w-full h-9 bg-danger text-white hover:bg-danger-hover rounded-md text-[13px] font-medium flex items-center justify-center gap-1.5 transition-colors">
                        <i data-lucide="lock" class="w-4 h-4"></i> Tutup Sesi
                    </button>
                </div>

                <!-- Stats -->
                <div class="flex flex-col gap-6">
                    <div class="bg-bg-surface border border-border-default rounded-lg p-6">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-[15px] font-semibold text-text-primary">Ringkasan Sesi Live</h2>
                            <span id="sync-status" class="inline-flex items-center px-2 py-0.5 rounded border border-success/20 bg-success-subtle text-success text-[11px] font-medium gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></span> Sinkronisasi Aktif
                            </span>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Total</div>
                                <div class="text-2xl font-semibold text-text-primary tabular leading-none" id="stat-total">--</div>
                            </div>
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface border-l-4 border-l-success">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Hadir</div>
                                <div class="text-2xl font-semibold text-success tabular leading-none" id="stat-present">--</div>
                            </div>
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface border-l-4 border-l-info">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Izin</div>
                                <div class="text-2xl font-semibold text-info tabular leading-none" id="stat-permission">--</div>
                            </div>
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface border-l-4 border-l-warning">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Sakit</div>
                                <div class="text-2xl font-semibold text-warning tabular leading-none" id="stat-sick">--</div>
                            </div>
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface border-l-4 border-l-danger">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Alpa</div>
                                <div class="text-2xl font-semibold text-danger tabular leading-none" id="stat-absent">--</div>
                            </div>
                            <div class="border border-border-default rounded-lg p-4 bg-bg-surface border-l-4 border-l-accent">
                                <div class="text-[12px] font-medium text-text-secondary mb-1">Hadir %</div>
                                <div class="text-2xl font-semibold text-accent tabular leading-none" id="stat-rate">--</div>
                            </div>
                        </div>
                    </div>

                    <!-- Student Table -->
                    <div class="bg-bg-surface border border-border-default rounded-lg flex-1">
                        <div class="px-5 py-4 border-b border-border-default">
                            <h3 class="text-[14px] font-semibold text-text-primary">Daftar Kehadiran Murid</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-bg-hover border-b border-border-default">
                                        <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap w-16">No</th>
                                        <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap">Nama Siswa</th>
                                        <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap">NIS</th>
                                        <th class="px-6 py-3 text-[12px] font-medium text-text-secondary uppercase tracking-wider whitespace-nowrap text-right">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="students-tbody">
                                    <tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-text-muted">Memuat data murid...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/utils.js?v=1781115035990"></script>
    <script src="../js/api.js?v=1781115035990"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/layout.js?v=1781115035990"></script>
    <script>
        let sessionId = null;
        let refreshInterval = null;
        let classId = null;
        let studentList = [];

        document.addEventListener('DOMContentLoaded', () => {
            const user = utils.checkAuth('teacher');
            if (!user) return;
            layout.init('teacher', 'schedule');
            const urlParams = new URLSearchParams(window.location.search);
            sessionId = urlParams.get('session_id') || sessionStorage.getItem('active_session_id');
            if (!sessionId) { if(window.utils && utils.showToast) utils.showToast('Invalid session ID', 'error'); window.location.href = 'schedule.html'; return; }
            sessionStorage.removeItem('active_session_id');
            initPage();
            refreshInterval = setInterval(fetchAttendanceData, 5000);
            if(window.lucide) lucide.createIcons();

            document.getElementById('end-btn').addEventListener('click', async () => {
                if (!(await ui.confirm('Tutup sesi ini? Siswa tidak bisa lagi scan QR.'))) return;
                const btn = document.getElementById('end-btn');
                try {
                    if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Menutup Sesi...');
                    await api.post(`/qr/close/${sessionId}`);
                    clearInterval(refreshInterval);
                    if(window.utils && utils.showToast) utils.showToast('Sesi berhasil ditutup', 'success');
                    window.location.href = 'dashboard.html';
                } catch (error) { 
                    if(window.utils && utils.showToast) utils.showToast(error.message, 'error'); 
                    if (window.ui && ui.resetButton) ui.resetButton(btn);
                }
            });

            document.getElementById('download-btn').addEventListener('click', () => {
                const img = document.querySelector('#qrcode img');
                if (!img) {
                    if(window.utils && utils.showToast) utils.showToast('QR Code belum dimuat', 'warning');
                    return;
                }
                const a = document.createElement('a');
                a.href = img.src;
                a.download = `QR_Sesi_${sessionId}.gif`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            document.getElementById('share-btn').addEventListener('click', async () => {
                const img = document.querySelector('#qrcode img');
                if (!img) {
                    if(window.utils && utils.showToast) utils.showToast('QR Code belum dimuat', 'warning');
                    return;
                }
                try {
                    const res = await fetch(img.src);
                    const blob = await res.blob();
                    const file = new File([blob], `QR_Sesi_${sessionId}.gif`, { type: blob.type });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'QR Absensi Kelas',
                            text: 'Silakan scan QR Code ini untuk kehadiran.',
                            files: [file]
                        });
                    } else {
                        if(window.utils && utils.showToast) utils.showToast('Browser Anda tidak mendukung share file langsung. Silakan gunakan tombol Unduh dan kirimkan manual.', 'info');
                    }
                } catch (e) {
                    console.error('Share failed', e);
                }
            });
        });

        async function initPage() {
            try {
                const sessionRes = await api.get(`/qr/${sessionId}`);
                const session = sessionRes.data;
                classId = session.class_id;
                
                // Ambil daftar murid spesifik untuk kelas ini sekali saja di awal
                const studentsRes = await api.get(`/students?class_id=${classId}&limit=500`);
                studentList = studentsRes.data.students || [];

                if (session.status !== 'active') {
                    if(window.utils && utils.showToast) utils.showToast('Sesi ini sudah tidak aktif.', 'error');
                    clearInterval(refreshInterval);
                    document.getElementById('end-btn').style.display = 'none';
                    const badge = document.getElementById('sync-status');
                    badge.className = 'inline-flex items-center px-2 py-0.5 rounded border border-danger/20 bg-danger-subtle text-danger text-[11px] font-medium gap-1.5';
                    badge.innerHTML = '<i data-lucide="x-circle" class="w-3 h-3"></i> Sesi Ditutup';
                    if (window.lucide) lucide.createIcons({root: badge});
                }
                document.getElementById('class-info').textContent = `Sesi ID: ${session.id}`;
                const qrData = JSON.stringify({ sessionId: session.id, token: session.qr_token });
                const typeNumber = 0; const errorCorrectionLevel = 'L';
                const qr = qrcode(typeNumber, errorCorrectionLevel); qr.addData(qrData); qr.make();
                document.getElementById('qrcode').innerHTML = qr.createImgTag(5, 0);
                await fetchAttendanceData();
                if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
            } catch (error) { console.error(error); if(window.utils && utils.showToast) utils.showToast('Failed to load session details', 'error'); }
        }

        async function fetchAttendanceData() {
            try {
                const attendanceRes = await api.get(`/attendance/session/${sessionId}`);
                const attendedRecords = attendanceRes.data || [];
                
                // Map status by student ID
                const attendanceMap = {};
                attendedRecords.forEach(r => {
                    attendanceMap[r.student_id] = r.status;
                });
                
                const totalStudents = studentList.length;
                let presentCount = 0;
                let sickCount = 0;
                let permissionCount = 0;
                
                studentList.forEach(s => {
                    const status = attendanceMap[s.id];
                    if (status === 'present') presentCount++;
                    else if (status === 'sick') sickCount++;
                    else if (status === 'permission') permissionCount++;
                });
                
                const absentCount = totalStudents - presentCount - sickCount - permissionCount;
                const rate = totalStudents ? Math.round((presentCount / totalStudents) * 100) : 0;
                
                document.getElementById('stat-total').textContent = totalStudents;
                document.getElementById('stat-present').textContent = presentCount;
                document.getElementById('stat-permission').textContent = permissionCount;
                document.getElementById('stat-sick').textContent = sickCount;
                document.getElementById('stat-absent').textContent = absentCount;
                document.getElementById('stat-rate').textContent = `${rate}%`;
                
                const tbody = document.getElementById('students-tbody');
                let html = '';
                
                if (studentList.length === 0) {
                    html = '<tr><td colspan="4" class="px-6 py-8 text-center text-[13px] text-text-muted">Belum ada murid yang terdaftar di kelas ini.</td></tr>';
                } else {
                    studentList.forEach((student, index) => {
                        const status = attendanceMap[student.id];
                        let badgeHtml = '';
                        if (status === 'present') {
                            badgeHtml = `<span class="inline-flex items-center px-2 py-0.5 rounded border border-success/20 bg-success-subtle text-success text-[11px] font-medium leading-none gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> Hadir</span>`;
                        } else if (status === 'sick') {
                            badgeHtml = `<span class="inline-flex items-center px-2 py-0.5 rounded border border-warning/20 bg-warning-subtle text-warning text-[11px] font-medium leading-none gap-1"><i data-lucide="activity" class="w-3 h-3"></i> Sakit</span>`;
                        } else if (status === 'permission') {
                            badgeHtml = `<span class="inline-flex items-center px-2 py-0.5 rounded border border-info/20 bg-info-subtle text-info text-[11px] font-medium leading-none gap-1"><i data-lucide="info" class="w-3 h-3"></i> Izin</span>`;
                        } else {
                            badgeHtml = `<span class="inline-flex items-center px-2 py-0.5 rounded border border-danger/20 bg-danger-subtle text-danger text-[11px] font-medium leading-none gap-1"><i data-lucide="x-circle" class="w-3 h-3"></i> Alpa</span>`;
                        }
                        
                        html += `<tr class="border-b border-border-default hover:bg-bg-hover transition-colors">
                            <td class="px-6 py-3 text-[13px] text-text-secondary whitespace-nowrap">${index + 1}</td>
                            <td class="px-6 py-3 text-[13px] font-medium text-text-primary whitespace-nowrap">${student.name || student.full_name || '-'}</td>
                            <td class="px-6 py-3 text-[13px] text-text-secondary whitespace-nowrap">${student.nis || '-'}</td>
                            <td class="px-6 py-3 text-right whitespace-nowrap">${badgeHtml}</td>
                        </tr>`;
                    });
                }
                tbody.innerHTML = html;
                if(window.lucide) lucide.createIcons({root: tbody});
            } catch (error) { console.error(error); }
        }
    </script>
</body>
</html>
