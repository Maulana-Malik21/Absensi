<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Jadwal Pelajaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="max-w-7xl mx-auto pb-6">
        <!-- Page Header & Actions -->
        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-[13px] font-semibold text-text-primary uppercase tracking-wide mb-1">Jadwal Pelajaran</h2>
                <p class="text-[13px] text-text-muted">Atur jadwal mata pelajaran per kelas dan hari.</p>
            </div>
            <button onclick="ui.showModal('addScheduleModal')" class="w-full md:w-auto flex items-center justify-center gap-2 px-4 h-8 bg-accent text-white rounded-md text-[13px] font-medium hover:bg-accent-hover transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i> Tambah Jadwal
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="bg-bg-surface border border-border-default rounded-lg p-3 mb-4 flex flex-col sm:flex-row gap-3">
            <div class="relative w-full sm:flex-1">
                <select id="classFilter" class="w-full h-8 pl-3 pr-8 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-secondary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle appearance-none cursor-pointer transition-colors">
                    <option value="">Semua Kelas</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-muted pointer-events-none"></i>
            </div>
            <div class="relative w-full sm:flex-1">
                <select id="dayFilter" class="w-full h-8 pl-3 pr-8 bg-bg-surface border border-border-default rounded-md text-[13px] text-text-secondary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle appearance-none cursor-pointer transition-colors">
                    <option value="">Semua Hari</option>
                    <option value="Senin">Senin</option>
                    <option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option>
                    <option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option>
                    <option value="Sabtu">Sabtu</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-muted pointer-events-none"></i>
            </div>
        </div>

        <!-- Table Card -->
        <div class="bg-bg-surface border border-border-default rounded-lg overflow-hidden">
            <div id="table-container" class="min-h-[300px]">
                <div class="p-6 space-y-3"><div class="h-8 bg-bg-hover rounded animate-pulse"></div><div class="h-12 bg-bg-hover rounded animate-pulse opacity-70"></div><div class="h-12 bg-bg-hover rounded animate-pulse opacity-50"></div></div>
            </div>
        </div>
    </div>

    <!-- ADD SCHEDULE MODAL -->
    <div id="addScheduleModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-bg-surface w-full max-w-md rounded-lg border border-border-default shadow-lg flex flex-col max-h-[90vh] animate-fade-in-up">
            <div class="flex items-center justify-between px-5 py-4 border-b border-border-default">
                <h3 class="text-[14px] font-semibold text-text-primary">Tambah Jadwal Pelajaran</h3>
                <button onclick="ui.hideModal('addScheduleModal')" class="p-1 text-text-placeholder hover:text-text-secondary hover:bg-bg-hover rounded-md transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="overflow-y-auto p-5">
                <form id="addScheduleForm" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Kelas <span class="text-danger">*</span></label>
                        <select name="class_id" id="sched_class" required class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                            <option value="">-- Pilih Kelas --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Mata Pelajaran <span class="text-danger">*</span></label>
                        <select name="subject_id" id="sched_subject" required class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                            <option value="">-- Pilih Mapel --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Guru <span class="text-danger">*</span></label>
                        <select name="teacher_id" id="sched_teacher" required class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                            <option value="">-- Pilih Guru --</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Hari <span class="text-danger">*</span></label>
                            <select name="day" required class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                                <option value="">Hari</option>
                                <option>Senin</option><option>Selasa</option><option>Rabu</option>
                                <option>Kamis</option><option>Jumat</option><option>Sabtu</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Mulai</label>
                            <input type="time" name="start_time" class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                        </div>
                        <div>
                            <label class="block text-[12px] font-medium text-text-secondary mb-1.5">Selesai</label>
                            <input type="time" name="end_time" class="w-full h-8 px-3 bg-bg-surface border border-border-default rounded-md text-[13px] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent-subtle">
                        </div>
                    </div>
                </form>
            </div>
            <div class="px-5 py-3 border-t border-border-default flex justify-end gap-2 bg-bg-page rounded-b-lg">
                <button onclick="ui.hideModal('addScheduleModal')" class="px-4 h-8 bg-bg-surface border border-border-default rounded-md text-[13px] font-medium text-text-secondary hover:bg-bg-hover transition-colors">Batal</button>
                <button type="submit" form="addScheduleForm" class="px-4 h-8 bg-accent text-white rounded-md text-[13px] font-medium hover:bg-accent-hover transition-colors">Simpan Jadwal</button>
            </div>
        </div>
    </div>

    <script src="../js/utils.js?v=3"></script>
    <script src="../js/api.js?v=3"></script>
    <script src="../components/ui.js?v=3"></script>
    <script src="../components/layout.js?v=5"></script>
    <script>
        let currentPage = 1; const limit = 20;

        document.addEventListener('DOMContentLoaded', async () => {
            layout.init('admin', 'schedules');
            await loadMasterData();
            fetchData();

            ['classFilter','dayFilter'].forEach(id => {
                document.getElementById(id)?.addEventListener('change', () => { currentPage = 1; fetchData(); });
            });

            document.getElementById('addScheduleForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const btn = document.querySelector('[form="addScheduleForm"]');
                try { 
                    if (window.ui && ui.setButtonLoading) ui.setButtonLoading(btn, 'Menyimpan...');
                    
                    // Look up the assignment_id based on class_id + subject_id + teacher_id
                    const qStr = `?class_id=${data.class_id}&academic_year_id=&teacher_id=${data.teacher_id}&limit=500`;
                    const assRes = await api.get(`/assignments${qStr}`);
                    const assignmentsList = assRes.data?.assignments || assRes.data || [];
                    
                    const match = assignmentsList.find(a => 
                        String(a.class_id) === String(data.class_id) && 
                        String(a.subject_id) === String(data.subject_id) &&
                        String(a.teacher_id) === String(data.teacher_id)
                    );
                    
                    if (!match) {
                        await ui.alert('Tidak ditemukan penugasan yang sesuai. Pastikan guru tersebut sudah ditugaskan untuk mata pelajaran dan kelas ini di menu Penugasan Mengajar.', 'Penugasan Tidak Ditemukan');
                        return;
                    }
                    
                    await api.post('/schedules', { 
                        assignment_id: match.id, 
                        day_of_week: data.day, 
                        start_time: data.start_time, 
                        end_time: data.end_time 
                    });
                    ui.hideModal('addScheduleModal'); e.target.reset(); fetchData();
                    if(window.utils) utils.showToast('Jadwal berhasil disimpan', 'success');
                } catch(err) {
                    if (err.data && err.data.errors && err.data.errors.length > 0) {
                        const errorList = err.data.errors.map(e => `<li class="mb-1">${e}</li>`).join('');
                        if (window.ui && ui.alert) {
                            ui.alert(`<div class="max-h-60 overflow-y-auto text-sm text-left text-danger bg-danger-subtle p-3 rounded border border-danger/30"><ul class="list-disc pl-4">${errorList}</ul></div>`, 'Gagal Import Data');
                        } else if(window.utils && utils.showToast) {
                            utils.showToast(err.message || 'Gagal import data', 'error');
                        }
                    } else {
                        if(window.utils && utils.showToast) utils.showToast(err.message || 'Gagal import data', 'error');
                    }
                } finally { if (window.ui && ui.resetButton) ui.resetButton(btn); }
            });
        });

        async function loadMasterData() {
            try {
                const [teachRes, classRes, subjectRes] = await Promise.all([
                    api.get('/teachers?limit=500'), api.get('/school/classes'), api.get('/school/subjects')
                ]);
                const teachers = teachRes.data.teachers||[];
                const classes = classRes.data||[];
                const subjects = subjectRes.data||[];

                const cf = document.getElementById('classFilter');
                ui.populateClassDropdown([cf, document.getElementById('sched_class')], classes);
                subjects.forEach(s => document.getElementById('sched_subject')?.appendChild(new Option(s.name, s.id)));
                teachers.forEach(t => document.getElementById('sched_teacher')?.appendChild(new Option(t.full_name, t.id)));
            } catch(e) { console.error(e); }
        }

        const DAY_COLORS = { 
            Senin:'text-accent border-accent-border bg-accent-subtle', 
            Selasa:'text-[#7C3AED] border-[#DDD6FE] bg-[#F5F3FF]', 
            Rabu:'text-success border-[#A7F3D0] bg-success-subtle', 
            Kamis:'text-warning border-[#FDE68A] bg-warning-subtle', 
            Jumat:'text-danger border-[#FECACA] bg-danger-subtle', 
            Sabtu:'text-text-muted border-border-default bg-bg-hover' 
        };

        async function fetchData() {
            const container = document.getElementById('table-container');
            if(!container) return;
            container.innerHTML = window.ui && ui.getTableSkeleton ? ui.getTableSkeleton(8, 6) : `<div class="p-6 space-y-3"><div class="h-8 bg-bg-hover rounded animate-pulse"></div></div>`;
            try {
                const classId = document.getElementById('classFilter')?.value||'';
                const day = document.getElementById('dayFilter')?.value||'';
                let query = `?page=${currentPage}&limit=${limit}`;
                if(classId) query += `&class_id=${classId}`;
                if(day) query += `&day=${day}`;

                const r = await api.get(`/schedules${query}`);
                // Backend returns flat array or object with schedules+pagination
                let schedules = [];
                let pagination = null;
                if (Array.isArray(r.data)) {
                    schedules = r.data;
                } else {
                    schedules = r.data?.schedules || [];
                    pagination = r.data?.pagination || null;
                }

                // Client-side day filter if backend doesn't support it
                if(day && schedules.length > 0) {
                    schedules = schedules.filter(s => (s.day_of_week||s.day||'') === day);
                }

                if(!schedules||schedules.length===0) {
                    container.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-center">
                        <div class="w-12 h-12 bg-bg-hover rounded-full flex items-center justify-center mb-3"><i data-lucide="calendar" class="w-5 h-5 text-text-placeholder"></i></div>
                        <h3 class="text-[14px] font-medium text-text-primary mb-1">Belum Ada Jadwal</h3>
                        <p class="text-[13px] text-text-muted">Mulai dengan menambahkan jadwal pelajaran.</p>
                    </div>`;
                    if(window.lucide) lucide.createIcons(); return;
                }

                let html = `<div class="overflow-x-auto"><table class="w-full text-left border-collapse">
                    <thead><tr class="border-b border-border-default">
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted">Hari</th>
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted">Waktu</th>
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted">Kelas</th>
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted">Mata Pelajaran</th>
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted">Guru</th>
                        <th scope="col" class="px-5 py-3 text-[12px] font-medium text-text-muted text-right">Aksi</th>
                    </tr></thead><tbody class="divide-y divide-border-default">`;

                schedules.forEach(s => {
                    const dayKey = s.day_of_week || s.day || '';
                    const dayCls = DAY_COLORS[dayKey] || 'text-text-muted border-border-default bg-bg-hover';
                    html += `<tr class="hover:bg-bg-hover transition-colors group">
                        <td class="px-5 py-3.5"><span class="px-2 py-0.5 rounded border text-[11px] font-semibold ${dayCls}">${dayKey||'-'}</span></td>
                        <td class="px-5 py-3.5 text-[13px] font-mono text-text-secondary tabular">${s.start_time||''} - ${s.end_time||''}</td>
                        <td class="px-5 py-3.5 text-[13px] font-medium text-text-primary">${s.class_name||'-'}</td>
                        <td class="px-5 py-3.5 text-[13px] text-text-secondary">${s.subject_name||'-'}</td>
                        <td class="px-5 py-3.5 text-[13px] text-text-muted">${s.teacher_name||'-'}</td>
                        <td class="px-5 py-3.5 text-right">
                            <div class="flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="deleteSchedule(${s.id})" class="p-1.5 text-text-muted hover:text-danger hover:bg-danger-subtle rounded-md transition-colors" title="Hapus"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;

                if(pagination&&pagination.totalPages>1) {
                    html += `<div class="flex flex-col sm:flex-row items-center justify-between px-5 py-3 border-t border-border-default bg-bg-page gap-3">
                        <span class="text-[12px] text-text-muted">Halaman <b class="text-text-primary">${pagination.page}</b> dari ${pagination.totalPages}</span>
                        <div class="flex gap-2">
                            <button onclick="changePage(${pagination.page-1})" ${pagination.page===1?'disabled':''} class="px-3 h-7 bg-bg-surface border border-border-default rounded text-[12px] font-medium text-text-secondary disabled:opacity-50 hover:bg-bg-hover transition-colors">Prev</button>
                            <button onclick="changePage(${pagination.page+1})" ${pagination.page===pagination.totalPages?'disabled':''} class="px-3 h-7 bg-bg-surface border border-border-default rounded text-[12px] font-medium text-text-secondary disabled:opacity-50 hover:bg-bg-hover transition-colors">Next</button>
                        </div>
                    </div>`;
                }

                container.innerHTML = html;
                if(window.lucide) lucide.createIcons();
            } catch(err) {
                console.error("fetchData error:", err);
                container.innerHTML = `<div class="p-8 text-center text-danger text-[13px]">Gagal memuat data. <button onclick="fetchData()" class="underline font-medium">Coba lagi</button></div>`;
            } finally {
                if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
            }
        }

        function changePage(p) { currentPage = p; fetchData(); }
        async function deleteSchedule(id) {
            if (!(await ui.confirm('Hapus jadwal ini?'))) return;
            try { await api.delete(`/schedules/${id}`); fetchData(); } catch(e) { if(window.utils) utils.showToast(e.message, 'error'); }
        }
    </script>
</body>
</html>
