<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Siswa - Dashboard Siswa</title>
    <script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/output.css">
</head>

<body>
    <div id="sidebar-root"></div>
    <div id="navbar-root"></div>

    <main class="p-4 md:p-8 min-h-screen pb-20">
        <div class="w-full max-w-7xl mx-auto">

            <!-- WELCOME BANNER -->
            <div
                class="bg-gradient-to-r from-accent to-accent-hover rounded-xl p-6 md:p-8 mb-6 text-white relative overflow-hidden shadow-sm">
                <!-- Background Decoration -->
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                <div class="absolute right-20 -bottom-10 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>

                <div
                    class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-6">
                    <div class="flex-1">
                        <h2 class="text-2xl md:text-3xl font-bold mb-2 tracking-tight">Halo, <span
                                id="student-name">Siswa</span>! </h2>
                        <div class="flex flex-wrap items-center gap-2 text-white/80 text-[13px] md:text-[14px]">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                            <span id="current-date">--</span>
                        </div>
                    </div>
                    <div
                        class="bg-black/20 backdrop-blur-sm px-4 py-3 rounded-lg border border-white/10 w-full md:max-w-sm">
                        <p class="text-[13px] md:text-[14px] italic text-white/90 leading-relaxed"
                            id="motivational-quote">Memuat motivasi...</p>
                    </div>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
                <!-- Hadir -->
                <div
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col relative overflow-hidden group hover:border-accent/50 transition-colors">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-10 h-10 rounded-full bg-success/10 flex items-center justify-center">
                            <i data-lucide="check-circle" class="w-5 h-5 text-success"></i>
                        </div>
                    </div>
                    <p class="text-[13px] font-medium text-text-secondary mb-1">Total Hadir</p>
                    <h3 class="text-2xl font-bold text-text-primary tabular-nums tracking-tight" id="stat-present">--
                    </h3>
                </div>

                <!-- Alpha -->
                <div
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col relative overflow-hidden group hover:border-accent/50 transition-colors">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-10 h-10 rounded-full bg-danger/10 flex items-center justify-center">
                            <i data-lucide="x-circle" class="w-5 h-5 text-danger"></i>
                        </div>
                    </div>
                    <p class="text-[13px] font-medium text-text-secondary mb-1">Total Alpha</p>
                    <h3 class="text-2xl font-bold text-text-primary tabular-nums tracking-tight" id="stat-absent">--
                    </h3>
                </div>

                <!-- Sakit/Izin -->
                <div
                    class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col relative overflow-hidden group hover:border-accent/50 transition-colors">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-10 h-10 rounded-full bg-warning/10 flex items-center justify-center">
                            <i data-lucide="activity" class="w-5 h-5 text-warning"></i>
                        </div>
                    </div>
                    <p class="text-[13px] font-medium text-text-secondary mb-1">Sakit / Izin</p>
                    <h3 class="text-2xl font-bold text-text-primary tabular-nums tracking-tight" id="stat-other">--</h3>
                </div>

                <!-- Rate / Scanner -->
                <div class="bg-bg-surface border border-border-default rounded-lg p-5 flex flex-col relative overflow-hidden group hover:border-accent/50 transition-colors cursor-pointer"
                    onclick="window.location.href='scanner.html'">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-10 h-10 rounded-full bg-accent/10 flex items-center justify-center">
                            <i data-lucide="qr-code" class="w-5 h-5 text-accent"></i>
                        </div>
                        <div class="text-right">
                            <span class="text-[12px] font-medium text-success bg-success/10 px-2 py-0.5 rounded-full"
                                id="attendance-rate">--%</span>
                        </div>
                    </div>
                    <p class="text-[13px] font-medium text-text-secondary mb-1">Absensi Hari Ini</p>
                    <h3
                        class="text-[14px] font-bold text-accent group-hover:text-accent-hover transition-colors flex items-center gap-1 mt-1">
                        Buka Scanner <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </h3>
                </div>
            </div>

            <!-- Content Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Recent Attendance -->
                <div
                    class="lg:col-span-2 flex flex-col bg-bg-surface border border-border-default rounded-lg overflow-hidden">
                    <div class="flex items-center justify-between px-5 py-4 border-b border-border-default">
                        <h3 class="text-[14px] font-semibold text-text-primary flex items-center gap-2">
                            <i data-lucide="clock" class="w-4 h-4 text-text-muted"></i>
                            Absensi Terakhir
                        </h3>
                        <a href="history.html"
                            class="text-[13px] font-medium text-accent hover:text-accent-hover flex items-center gap-1 transition-colors">
                            Lihat Semua <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </a>
                    </div>
                    <div class="flex-1 p-5">
                        <div class="flex flex-col gap-3" id="recent-attendance-list">
                            <div class="flex justify-center p-8"><i data-lucide="loader-2"
                                    class="w-6 h-6 animate-spin text-accent"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Chart -->
                <div class="flex flex-col bg-bg-surface border border-border-default rounded-lg overflow-hidden">
                    <div class="flex items-center justify-between px-5 py-4 border-b border-border-default">
                        <h3 class="text-[14px] font-semibold text-text-primary flex items-center gap-2">
                            <i data-lucide="pie-chart" class="w-4 h-4 text-text-muted"></i>
                            Grafik Kehadiran
                        </h3>
                    </div>
                    <div class="flex-1 p-6 flex items-center justify-center min-h-[250px]">
                        <div class="w-full max-w-[200px] aspect-square relative">
                            <canvas id="attendanceChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/utils.js?v=4"></script>
    <script src="../js/api.js?v=5"></script>
    <script src="../components/layout.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = utils.checkAuth('student');
            if (!user) return;
            layout.init('student', 'dashboard');
            initPage(user);
        });

        async function initPage(user) {
            try {
                if (window.ui && ui.getCardSkeleton) {
                    const recentList = document.getElementById('recent-attendance-list');
                    if (recentList) recentList.innerHTML = ui.getCardSkeleton();
                }
                document.getElementById('student-name').textContent = user.full_name || 'Siswa';

                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);

                const quotes = [
                    "Pendidikan adalah senjata paling mematikan di dunia.",
                    "Hiduplah seolah engkau mati besok. Belajarlah seolah engkau hidup selamanya.",
                    "Pendidikan bukanlah proses mengisi wadah yang kosong.",
                    "Satu anak, satu guru, satu buku, dan satu pena dapat mengubah dunia.",
                    "Agama tanpa ilmu adalah buta. Ilmu tanpa agama adalah lumpuh.",
                    "Pendidikan adalah tiket ke masa depan.",
                    "Akar pendidikan itu pahit, tapi buahnya manis."
                ];
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
                document.getElementById('motivational-quote').textContent = `"${quotes[dayOfYear % quotes.length]}"`;

                const statsRes = await api.get('/analytics/student');
                const s = statsRes.data.stats || {};

                document.getElementById('stat-present').textContent = s.present || 0;
                document.getElementById('stat-absent').textContent = s.absent || 0;
                document.getElementById('stat-other').textContent = (s.sick || 0) + (s.permission || 0);

                const rate = parseInt(statsRes.data.percentage) || 0;
                document.getElementById('attendance-rate').textContent = `${rate}%`;

                // Initialize Chart
                const ctx = document.getElementById('attendanceChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Hadir', 'Alpha', 'Sakit', 'Izin'],
                        datasets: [{
                            data: [s.present || 0, s.absent || 0, s.sick || 0, s.permission || 0],
                            backgroundColor: ['#10B981', '#EF4444', '#F59E0B', '#3B82F6'],
                            borderWidth: 0, hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { usePointStyle: true, boxWidth: 8, font: { size: 11, family: "'Inter', sans-serif" } }
                            }
                        },
                        cutout: '75%'
                    }
                });

                const histRes = await api.get('/attendance/student/' + user.id);
                const history = histRes.data || [];
                const recentList = document.getElementById('recent-attendance-list');

                if (history.length === 0) {
                    recentList.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-10 text-center">
                            <div class="w-12 h-12 rounded-full bg-bg-hover flex items-center justify-center mb-3">
                                <i data-lucide="inbox" class="w-6 h-6 text-text-muted"></i>
                            </div>
                            <h3 class="text-[14px] font-medium text-text-primary mb-1">Belum Ada Riwayat</h3>
                            <p class="text-[13px] text-text-muted">Anda belum memiliki catatan absensi.</p>
                        </div>
                    `;
                    if (window.lucide) lucide.createIcons();
                    return;
                }

                // Show only top 4
                const recent = history.slice(0, 4);

                const STATUS_MAP = {
                    present: { label: 'Hadir', cls: 'bg-success/10 text-success border-success/20', icon: 'check-circle' },
                    absent: { label: 'Alpha', cls: 'bg-danger/10 text-danger border-danger/20', icon: 'x-circle' },
                    sick: { label: 'Sakit', cls: 'bg-warning/10 text-warning border-warning/20', icon: 'activity' },
                    permission: { label: 'Izin', cls: 'bg-info/10 text-info border-info/20', icon: 'info' }
                };

                recentList.innerHTML = recent.map(r => {
                    const st = STATUS_MAP[r.status] || STATUS_MAP.present;
                    const dDate = new Date(r.attendance_date || r.timestamp);
                    const dTime = new Date(r.timestamp);
                    const dateStr = dDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                    const timeStr = dTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                    return `
                        <div class="flex items-center gap-4 p-4 rounded-lg border border-border-default hover:border-accent/30 hover:bg-bg-hover transition-colors">
                            <div class="w-10 h-10 rounded-full ${st.cls.split(' ')[0]} flex items-center justify-center shrink-0">
                                <i data-lucide="${st.icon}" class="w-5 h-5 ${st.cls.split(' ')[1]}"></i>
                            </div>
                            <div class="flex-1 min-w-0 pr-2">
                                <h4 class="text-[14px] font-semibold text-text-primary truncate mb-1.5">${r.subject_name || 'Absensi Harian'}</h4>
                                <div class="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[12px] text-text-muted">
                                    <span class="flex items-center gap-1 whitespace-nowrap"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${dateStr}</span>
                                    <span class="flex items-center gap-1 whitespace-nowrap"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${timeStr}</span>
                                    <span class="flex items-center gap-1 whitespace-nowrap"><i data-lucide="smartphone" class="w-3.5 h-3.5"></i> ${r.is_manual ? 'Manual' : 'QR'}</span>
                                </div>
                            </div>
                            <div class="shrink-0 ml-1">
                                <span class="inline-flex items-center px-2 py-1 rounded-md text-[11px] font-medium border ${st.cls}">${st.label}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                if (window.lucide) lucide.createIcons();

            } catch (error) {
                console.error(error);
                if (window.utils) utils.showToast('Gagal memuat dashboard', 'error');
            } finally {
                if (window.ui && ui.hideGlobalLoader) ui.hideGlobalLoader();
            }
        }
    </script>
</body>

</html>
